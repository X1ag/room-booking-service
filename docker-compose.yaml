services:
  postgres:
    image: postgres:16-alpine
    container_name: room-booking-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-room_booking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: room-booking-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-room-booking}
      APP_ENV: ${APP_ENV:-docker}
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-5s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-5s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-10s}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-room_booking}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-10}
      DB_MIN_IDLE_CONNS: ${DB_MIN_IDLE_CONNS:-2}
      DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-30m}
      MIGRATIONS_PATH: ${MIGRATIONS_PATH:-file://migrations}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      JWT_TOKEN_TTL: ${JWT_TOKEN_TTL:-24h}
      DUMMY_ADMIN_ID: ${DUMMY_ADMIN_ID:-11111111-1111-1111-1111-111111111111}
      DUMMY_USER_ID: ${DUMMY_USER_ID:-22222222-2222-2222-2222-222222222222}
      LOGGER_LEVEL: ${LOGGER_LEVEL:-debug}
      LOGGER_NO_COLOR: ${LOGGER_NO_COLOR:-false}
      LOGGER_TIME_FORMAT: ${LOGGER_TIME_FORMAT:-2006-01-02T15:04:05Z}
      LOGGER_TIME_LOCATION: ${LOGGER_TIME_LOCATION:-UTC}
      LOGGER_PARTS_ORDER: ${LOGGER_PARTS_ORDER:-time,level,logger,message}
      LOGGER_PARTS_EXCLUDE: ${LOGGER_PARTS_EXCLUDE:-}
      LOGGER_FIELDS_ORDER: ${LOGGER_FIELDS_ORDER:-}
      LOGGER_FIELDS_EXCLUDE: ${LOGGER_FIELDS_EXCLUDE:-}
      LOGGER_LOGS_DIR: ${LOGGER_LOGS_DIR:-./logs}
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    restart: unless-stopped

volumes:
  postgres_data:
