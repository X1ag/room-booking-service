version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
